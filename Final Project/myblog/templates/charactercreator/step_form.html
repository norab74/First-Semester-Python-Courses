{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    .container { max-width: 720px; margin: 24px auto; padding: 16px; }
  </style>
</head>
<body>
  <div class="container">
    {% include 'includes/navbar.html' %}
    <h2>{{ title }} (Step {{ step }})</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div>
        <button type="submit">Next</button>
        {# Roll stats link for abilities step (requests GET ?roll=1) #}
        {% if step == 3 %}
          <a href="?roll=1" style="margin-left:1rem;">Roll stats (4d6 drop lowest)</a>
        {% endif %}
      </div>
    </form>
    <p><a href="/character/">Back To Character List</a></p>
  </div>
</body>
</html>
