<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type= "text/css" href="{{ url_for('static', filename='styles.css')}}">
    <title>Main Menu</title>
</head>
<body>
    <h1>Main Menu</h1>
    <p>Welcome, {{ name }}!</p>
            
        <form method="POST">
        <!-- Each button posts 'action' with the corresponding value -->
        <button type="submit" name="action" value="register">Register for a Course</button>
        <button type="submit" name="action" value="drop">Drop a Course</button>
        <button type="submit" name="action" value="sched">Display Schedule</button>
        <button type="submit" name="action" value="catalog">Display Available Courses</button>
        <button type="submit" name="action" value="exit">Exit</button>
        </form>

</body>
</html>
